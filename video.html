<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글정음 — 소개 영상</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --heaven: #1e40d4;
    --human: #2ea043;
    --earth: #d12c2c;
    --ink: #f5f5f0;
    --bg: #0b0d12;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
  }
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #0b0d12 100%);
  }

  /* star background */
  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 50px 160px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 200px 50px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 250px 90px, rgba(255,255,255,0.3), transparent);
    background-repeat: repeat;
    background-size: 280px 200px;
    opacity: 0.6;
    animation: twinkle 6s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* universal scene */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    text-align: center;
    padding: 0 24px;
    pointer-events: none;
  }

  /* total duration: 40s */
  .scene.active { animation: sceneShow forwards; }

  @keyframes sceneShow {
    0%, 100% { opacity: 0; transform: translateY(8px); }
    10%, 90% { opacity: 1; transform: translateY(0); }
  }

  /* timing per scene */
  .scene[data-scene="1"] { animation-duration: 4s; animation-delay: 0s; }
  .scene[data-scene="2"] { animation-duration: 5s; animation-delay: 4s; }
  .scene[data-scene="3"] { animation-duration: 5s; animation-delay: 9s; }
  .scene[data-scene="4"] { animation-duration: 5s; animation-delay: 14s; }
  .scene[data-scene="5"] { animation-duration: 6s; animation-delay: 19s; }
  .scene[data-scene="6"] { animation-duration: 6s; animation-delay: 25s; }
  .scene[data-scene="7"] { animation-duration: 5s; animation-delay: 31s; }
  .scene[data-scene="8"] { animation-duration: 4s; animation-delay: 36s; }

  /* Scene 1: Title */
  .title-ko {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(48px, 9vw, 110px);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .title-en {
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 600;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  /* Scene 2: Subtitle */
  .subtitle {
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 600;
    line-height: 1.4;
    max-width: 720px;
  }
  .subtitle strong { color: #ffd54f; font-weight: 700; }

  /* Scene 3-5: shapes + letters */
  .triad-row {
    display: flex;
    gap: clamp(20px, 5vw, 80px);
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .triad-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .shape-svg {
    width: clamp(80px, 12vw, 140px);
    height: clamp(80px, 12vw, 140px);
  }
  .shape-svg circle { fill: var(--heaven); }
  .shape-svg polygon { fill: var(--human); }
  .shape-svg rect { fill: var(--earth); }
  .shape-letter {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 800;
  }
  .blue { color: var(--heaven); }
  .green { color: var(--human); }
  .red { color: var(--earth); }
  .shape-label {
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 600;
    opacity: 0.85;
  }
  .shape-en {
    font-size: clamp(11px, 1.5vw, 13px);
    opacity: 0.6;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Scene 6: derivation */
  .derive-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 600;
  }
  .derive-row > div { display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .derive-row .arrow { opacity: 0.5; }

  /* Scene 7: numbers */
  .stat {
    font-size: clamp(80px, 16vw, 200px);
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #ffd54f 0%, #ff9d00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label {
    font-size: clamp(18px, 3vw, 28px);
    margin-top: -8px;
    opacity: 0.8;
  }

  /* Scene 8: CTA */
  .cta-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    margin-bottom: 20px;
  }
  .cta-url {
    font-family: 'Inter', monospace;
    font-size: clamp(14px, 2.5vw, 20px);
    background: rgba(255, 213, 79, 0.15);
    color: #ffd54f;
    padding: 12px 24px;
    border-radius: 999px;
    border: 1px solid rgba(255, 213, 79, 0.3);
  }

  /* Progress bar */
  .progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: rgba(255,255,255,0.15);
    width: 100%;
  }
  .progress::after {
    content: '';
    display: block;
    height: 100%;
    background: #ffd54f;
    width: 0;
    animation: progress 40s linear forwards;
  }
  @keyframes progress {
    to { width: 100%; }
  }

  /* Replay button */
  .replay {
    position: absolute;
    bottom: 24px;
    right: 24px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--ink);
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .replay.visible { opacity: 1; }
  .replay:hover { background: rgba(255,255,255,0.2); }

  /* Replay state */
  body.replay .scene { animation: none; opacity: 0; }
  body.replay .progress::after { animation: none; width: 100%; }

  /* Soundless badge (top-right) */
  .badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 11px;
    background: rgba(255,255,255,0.08);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stars"></div>
  <div class="badge">SILENT · 약 40초</div>

  <!-- Scene 1: Title -->
  <div class="scene active" data-scene="1">
    <div class="title-ko">한글정음</div>
    <div class="title-en">HANGUL · The Cosmic Philosophy</div>
  </div>

  <!-- Scene 2: Hook -->
  <div class="scene active" data-scene="2">
    <div class="subtitle">
      한글은 단순한 알파벳이 아니다.<br>
      <strong>우주를 담은 기하학적 모형</strong>이다.
    </div>
  </div>

  <!-- Scene 3: Heaven -->
  <div class="scene active" data-scene="3">
    <div class="triad-item">
      <svg class="shape-svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44"/></svg>
      <div class="shape-letter blue">ㅇ</div>
      <div class="shape-label">하늘 · Heaven</div>
    </div>
  </div>

  <!-- Scene 4: Human -->
  <div class="scene active" data-scene="4">
    <div class="triad-item">
      <svg class="shape-svg" viewBox="0 0 100 100"><polygon points="50,6 94,88 6,88"/></svg>
      <div class="shape-letter green">ㅅ</div>
      <div class="shape-label">사람 · Human</div>
    </div>
  </div>

  <!-- Scene 5: Earth + All three -->
  <div class="scene active" data-scene="5">
    <div class="triad-row">
      <div class="triad-item">
        <svg class="shape-svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44"/></svg>
        <div class="shape-letter blue">ㅇ</div>
        <div class="shape-en">Heaven</div>
      </div>
      <div class="triad-item">
        <svg class="shape-svg" viewBox="0 0 100 100"><polygon points="50,6 94,88 6,88"/></svg>
        <div class="shape-letter green">ㅅ</div>
        <div class="shape-en">Human</div>
      </div>
      <div class="triad-item">
        <svg class="shape-svg" viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84"/></svg>
        <div class="shape-letter red">ㅁ</div>
        <div class="shape-en">Earth</div>
      </div>
    </div>
  </div>

  <!-- Scene 6: Derivation -->
  <div class="scene active" data-scene="6">
    <div style="margin-bottom:24px;font-size:clamp(16px,2.5vw,22px);opacity:0.7;">세 도형에서 28자가 자라난다</div>
    <div class="derive-row">
      <div><span class="blue">ㅇ</span><span class="arrow">→</span><span>ㆁ ㅎ ㆆ</span></div>
      <div><span class="green">ㅅ</span><span class="arrow">→</span><span>ㅈ ㅊ ㅿ</span></div>
      <div><span class="red">ㅁ</span><span class="arrow">→</span><span>ㅂ ㅍ ㄱ ㅋ ㄴ ㄷ ㅌ ㄹ</span></div>
    </div>
  </div>

  <!-- Scene 7: Stat -->
  <div class="scene active" data-scene="7">
    <div class="stat">1446</div>
    <div class="stat-label">세종대왕이 명문화한 우주의 글자</div>
  </div>

  <!-- Scene 8: CTA -->
  <div class="scene active" data-scene="8">
    <div class="cta-title">무료로 만나보세요</div>
    <div class="cta-url">wehome.me/trust/hangul</div>
  </div>

  <div class="progress"></div>

  <button class="replay" id="replayBtn">↻ 다시 보기</button>
</div>

<script>
const TOTAL = 40_000;
const btn = document.getElementById('replayBtn');

function showReplay() {
  btn.classList.add('visible');
}

setTimeout(showReplay, TOTAL);

btn.addEventListener('click', () => {
  document.body.classList.add('replay');
  btn.classList.remove('visible');
  // Force reflow
  void document.body.offsetWidth;
  setTimeout(() => {
    document.body.classList.remove('replay');
    setTimeout(showReplay, TOTAL);
  }, 50);
});
</script>

</body>
</html>
